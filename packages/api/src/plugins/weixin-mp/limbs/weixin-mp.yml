# 微信公众号 Limb 声明 — 可执行的 REST API 元数据
# 通用 PluginLimbAdapter 从此文件驱动 HTTP 调用和 invoke handler

nodeId: weixin-mp
displayName: 微信公众号
platform: weixin
baseUrl: https://api.weixin.qq.com/cgi-bin

# ─── 认证配置（模板变量引用插件配置）──────────────────────
auth:
  type: client_credentials
  tokenEndpoint: /token
  tokenParams:
    grant_type: client_credential
    appid: ${WEIXIN_MP_APP_ID}
    secret: ${WEIXIN_MP_APP_SECRET}
  tokenResponsePath: access_token
  tokenPlacement: query
  tokenParamName: access_token
  tokenExpiredCodes: [40001, 40014, 42001]
  ttlSeconds: 7200

# ─── 错误解析 ────────────────────────────────────────────
error:
  codePath: errcode
  messagePath: errmsg

# ─── 能力声明（agent 发现用）─────────────────────────────
capabilities:
  - cap: content_read
    commands:
      - weixin_mp.check_status
      - weixin_mp.list_drafts
      - weixin_mp.publish_status
      - weixin_mp.list_material
      - weixin_mp.get_material_count
      - weixin_mp.list_articles
    authLevel: free
  - cap: content_publish
    commands:
      - weixin_mp.create_draft
      - weixin_mp.update_draft
      - weixin_mp.delete_draft
      - weixin_mp.submit_publish
      - weixin_mp.upload_image
      - weixin_mp.upload_material
      - weixin_mp.convert_markdown
      - weixin_mp.delete_material
      - weixin_mp.delete_article
    authLevel: leased

# ─── 命令定义 ────────────────────────────────────────────
commands:

  # ── invoke 类型（本地函数处理）──────────────────────────

  weixin_mp.check_status:
    type: invoke
    handler: weixin-mp:check_status
    description: 检查公众号连接状态（配置 + access_token 可达性）
    params: {}

  weixin_mp.convert_markdown:
    type: invoke
    handler: weixin-mp:convert_markdown
    description: 将 Markdown 转换为微信兼容内联样式 HTML 并写入文件（返回文件路径，可直接传给 create_draft 的 contentFilePath）
    params:
      markdown:
        type: string
        desc: Markdown 格式正文（内联传入，超过 2000 字符建议使用 markdownFilePath）。与 markdownFilePath 二选一
      markdownFilePath:
        type: string
        desc: OS 临时目录下的 Markdown 文件路径（如 /tmp/article.md）。必须在系统临时目录下，上限 2 MB。与 markdown 二选一

  weixin_mp.upload_image:
    type: invoke
    handler: weixin-mp:upload_image
    description: 上传图片到微信 CDN（返回可在文章正文中使用的链接）
    params:
      fileLocation:
        type: string
        required: true
        desc: 图片文件位置。支持 HTTP/HTTPS URL（如 https://example.com/photo.jpg）或 OS 临时目录下的本地路径（如 /tmp/photo.png）。本地文件必须在系统临时目录下，其他路径会被拒绝。格式：jpg/png/gif/bmp，上限 10 MB

  weixin_mp.upload_material:
    type: invoke
    handler: weixin-mp:upload_material
    description: 上传永久图片素材，返回 media_id（用作封面图）
    params:
      fileLocation:
        type: string
        required: true
        desc: 图片文件位置。支持 HTTP/HTTPS URL（如 https://example.com/cover.jpg）或 OS 临时目录下的本地路径（如 /tmp/cover.png）。本地文件必须在系统临时目录下，其他路径会被拒绝。格式：jpg/png/gif/bmp，上限 10 MB

  weixin_mp.create_draft:
    type: invoke
    handler: weixin-mp:create_draft
    description: 创建草稿箱文章（handler 直接调用微信 API，支持从本地文件读取大段内容）
    params:
      title:
        type: string
        required: true
        desc: 文章标题（1-64 字）
      content:
        type: string
        desc: 微信兼容 HTML 正文（先调用 convert_markdown）。内联传入，超过 2000 字符建议使用 contentFilePath。与 contentFilePath 二选一
      contentFilePath:
        type: string
        desc: OS 临时目录下的 HTML 文件路径（如 /tmp/article.html）。必须在系统临时目录下，上限 2 MB。与 content 二选一
      thumbMediaId:
        type: string
        required: true
        desc: 封面图素材 media_id（先调用 upload_material）
      author:
        type: string
        desc: 作者名（最长 16 字）
      digest:
        type: string
        desc: 摘要（最长 120 字）

  weixin_mp.update_draft:
    type: invoke
    handler: weixin-mp:update_draft
    description: 更新草稿箱文章内容（支持从本地文件读取正文，仅传需要修改的字段）
    params:
      mediaId:
        type: string
        required: true
        desc: 草稿 media_id（由 create_draft 返回）
      index:
        type: number
        default: 0
        desc: 多图文中的文章序号（从 0 开始，单图文默认 0）
      title:
        type: string
        desc: 文章标题（1-64 字）
      content:
        type: string
        desc: 微信兼容 HTML 正文（先调用 convert_markdown）。超过 2000 字符建议使用 contentFilePath。与 contentFilePath 二选一
      contentFilePath:
        type: string
        desc: OS 临时目录下的 HTML 文件路径（如 /tmp/article.html）。必须在系统临时目录下，上限 2 MB。与 content 二选一
      thumbMediaId:
        type: string
        desc: 封面图素材 media_id（先调用 upload_material）
      author:
        type: string
        desc: 作者名（最长 16 字）
      digest:
        type: string
        desc: 摘要（最长 120 字）

  # ── rest 类型（YAML 驱动 HTTP 调用）────────────────────

  weixin_mp.submit_publish:
    type: rest
    description: 发布草稿
    endpoint: /freepublish/submit
    method: POST
    body:
      media_id: ${params.mediaId}
    params:
      mediaId:
        type: string
        required: true
        desc: 草稿 media_id（由 create_draft 返回）

  weixin_mp.list_drafts:
    type: rest
    description: 列出草稿箱中的文章
    endpoint: /draft/batchget
    method: POST
    body:
      offset: ${params.offset}
      count: ${params.count}
      no_content: 1
    params:
      offset:
        type: number
        default: 0
        desc: 起始位置（从 0 开始）
      count:
        type: number
        default: 10
        desc: 获取数量（1-20）

  weixin_mp.publish_status:
    type: rest
    description: 查询文章发布状态
    endpoint: /freepublish/get
    method: POST
    body:
      publish_id: ${params.publishId}
    params:
      publishId:
        type: string
        required: true
        desc: 发布任务 ID（由 submit_publish 返回）

  # ── P0: 草稿管理补齐 ──────────────────────────────────

  weixin_mp.delete_draft:
    type: rest
    description: 删除草稿箱中的指定草稿
    endpoint: /draft/delete
    method: POST
    body:
      media_id: ${params.mediaId}
    params:
      mediaId:
        type: string
        required: true
        desc: 草稿 media_id（由 create_draft 返回）

  # ── P1: 素材管理 ──────────────────────────────────────

  weixin_mp.delete_material:
    type: rest
    description: 删除永久素材（图片/视频/音频/图文）
    endpoint: /material/del_material
    method: POST
    body:
      media_id: ${params.mediaId}
    params:
      mediaId:
        type: string
        required: true
        desc: 素材 media_id（由 upload_material 返回）

  weixin_mp.list_material:
    type: rest
    description: 获取永久素材列表
    endpoint: /material/batchget_material
    method: POST
    body:
      type: ${params.type}
      offset: ${params.offset}
      count: ${params.count}
    params:
      type:
        type: string
        required: true
        desc: 素材类型（image/video/voice/news）
      offset:
        type: number
        default: 0
        desc: 起始位置（从 0 开始）
      count:
        type: number
        default: 10
        desc: 获取数量（1-20）

  weixin_mp.get_material_count:
    type: rest
    description: 查询各类型永久素材数量（图片/视频/语音/图文）
    endpoint: /material/get_materialcount
    method: GET
    params: {}

  # ── P2: 发布后管理 ────────────────────────────────────

  weixin_mp.list_articles:
    type: rest
    description: 获取已发布文章列表
    endpoint: /freepublish/batchget
    method: POST
    body:
      offset: ${params.offset}
      count: ${params.count}
      no_content: 1
    params:
      offset:
        type: number
        default: 0
        desc: 起始位置（从 0 开始）
      count:
        type: number
        default: 10
        desc: 获取数量（1-20）

  weixin_mp.delete_article:
    type: rest
    description: 删除已发布的文章
    endpoint: /freepublish/delete
    method: POST
    body:
      article_id: ${params.articleId}
    params:
      articleId:
        type: string
        required: true
        desc: 文章 ID（由 list_articles 返回的 article_id）
